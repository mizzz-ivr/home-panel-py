name: 品質チェック

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Python構文・起動・テスト
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 依存関係の整合性を確認
        run: python -m pip check

      - name: Python構文を確認
        run: python -m compileall -q app tests

      - name: JavaScript構文を確認
        run: node --check app/static/app.js

      - name: FastAPIアプリを読み込み
        run: python -c "from app.main import app; assert app.title == 'Home Panel'"

      - name: テストを実行
        run: python -m pytest -q
